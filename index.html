<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>西咸隆基翻翻乐</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:"微软雅黑",sans-serif;}
body{background:#e3f2fd;padding:15px;}
.wrap{max-width:500px;margin:0 auto;text-align:center;}
.title{font-size:24px;color:#1976d2;font-weight:bold;margin:15px 0;}
.tip{color:#ff5722;font-weight:bold;margin-bottom:10px;}
input{width:90%;padding:12px;border:2px solid #1976d2;border-radius:30px;margin:6px 0;text-align:center;font-size:16px;}
.btn{background:#1976d2;color:#fff;border:none;padding:12px 24px;border-radius:50px;margin:8px;cursor:pointer;font-size:16px;}
.countdown{font-size:50px;color:#d32f2f;font-weight:bold;margin:30px 0;display:none;}
.game-box{display:none;margin:20px 0;}
.info-line{font-size:18px;font-weight:bold;margin:8px 0;color:#333;}
.card-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;max-width:360px;margin:15px auto;}
.card{aspect-ratio:1;background:#1976d2;border-radius:10px;color:#fff;font-size:26px;display:flex;align-items:center;justify-content:center;cursor:pointer;}
.rank-wrap{display:none;background:#fff;border-radius:15px;padding:20px;margin-top:20px;box-shadow:0 2px 10px #00000015;}
.rank-title{font-size:20px;color:#1976d2;font-weight:bold;margin-bottom:15px;}
.rank-item{text-align:left;padding:6px 0;border-bottom:1px solid #eee;}
.pop-result{display:none;position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);background:#fff;padding:30px;border-radius:15px;box-shadow:0 4px 20px #0003;z-index:99;}
</style>
</head>
<body>
<div class="wrap">
    <div class="title">🏢 西咸隆基 · 翻翻乐</div>
    <div class="tip" id="chanceTip">今日剩余次数：5 次</div>

    <input type="text" id="jobNum" placeholder="请输入工号">
    <input type="text" id="userName" placeholder="请输入姓名">
    <input type="text" id="deptName" placeholder="请输入部门">

    <div>
        <button class="btn" onclick="startGame()">开始游戏</button>
        <button class="btn" onclick="showRank()">查看实时排行榜</button>
    </div>

    <div class="countdown" id="cdText">3</div>
    <div class="game-box" id="gameBox">
        <div class="info-line">得分：<span id="scoreNum">0</span></div>
        <div class="info-line">剩余时间：<span id="timeNum">15</span> 秒</div>
        <div class="card-grid" id="cardGrid"></div>
    </div>

    <div class="rank-wrap" id="rankWrap">
        <div class="rank-title">🏆 全员互通·实时排行榜</div>
        <div id="rankList"></div>
    </div>

    <div class="pop-result" id="resPop">
        <h3>🎉 游戏结束</h3>
        <p>工号：<span id="resJob"></span></p>
        <p>姓名：<span id="resName"></span></p>
        <p>部门：<span id="resDept"></span></p>
        <p>得分：<span id="resScore"></span></p>
        <button class="btn" onclick="location.reload()">重新开始</button>
    </div>
</div>

<script>
const MAX_PLAY = 5;
let score = 0, leftTime = 15, timer = null, isRun = false;
let firstCard = null, lock = false;
const imgList = ["1.png","2.png","3.png","4.png","5.png","6.png","7.png","8.png"];

// 云端公共储存key（固定统一数据库）
const API_KEY = "longi_game_rank_2026";

// 每日次数
function getTodayKey(){let d=new Date();return `${d.getFullYear()}-${d.getMonth()+1}-${d.getDate()}`;}
function getUsed(){return Number(localStorage.getItem("play_"+getTodayKey()))||0;}
function addUsed(){localStorage.setItem("play_"+getTodayKey(),getUsed()+1);}
function updateChance(){document.getElementById("chanceTip").innerText="今日剩余次数："+(MAX_PLAY-getUsed())+" 次";}
window.onload = updateChance;

// 云端读取排行榜
async function getCloudRank(){
  let res = await fetch("https://api.oioweb.cn/api/kv/get?key="+API_KEY);
  let json = await res.json();
  return json.data ? JSON.parse(json.data) : [];
}
// 云端保存排行榜
async function saveCloudRank(list){
  await fetch("httpsapi.oioweb.cn/api/kv/set?key="+API_KEY+"&value="+encodeURIComponent(JSON.stringify(list)));
}

// 开始游戏
function startGame(){
    let job = document.getElementById("jobNum").value.trim();
    let name = document.getElementById("userName").value.trim();
    let dept = document.getElementById("deptName").value.trim();
    if(!job||!name||!dept){alert("请填写完整工号、姓名、部门");return;}
    if(getUsed()>=MAX_PLAY){alert("今日次数已用完！");return;}
    let count=3,cdDom=document.getElementById("cdText");
    cdDom.style.display="block";cdDom.innerText=count;
    let t=setInterval(()=>{
        count--;cdDom.innerText=count;
        if(count<=0){clearInterval(t);cdDom.style.display="none";runGame();}
    },1000);
}

function runGame(){
    score=0;leftTime=15;isRun=true;firstCard=null;lock=false;
    document.getElementById("gameBox").style.display="block";
    document.getElementById("scoreNum").innerText=score;
    document.getElementById("timeNum").innerText=leftTime;
    initCard();
    timer=setInterval(()=>{
        leftTime--;
        document.getElementById("timeNum").innerText=leftTime;
        if(leftTime<=0)gameOver();
    },1000);
}

function initCard(){
    let grid=document.getElementById("cardGrid");
    grid.innerHTML="";
    let arr=[...imgList,...imgList].sort(()=>Math.random()-0.5);
    arr.forEach(src=>{
        let card=document.createElement("div");
        card.className="card";card.innerText="?";
        card.onclick=()=>clickCard(card,src);
        grid.appendChild(card);
    });
}

function clickCard(dom,src){
    if(!isRun||lock||dom.innerText!=="?")return;
    dom.innerText="";dom.style.background="url("+src+") center/cover";
    if(!firstCard){firstCard={dom,src};return;}
    lock=true;
    if(firstCard.src===src){
        score++;document.getElementById("scoreNum").innerText=score;
        firstCard=null;lock=false;
    }else{
        setTimeout(()=>{
            firstCard.dom.innerText="?";firstCard.dom.style.background="";
            dom.innerText="?";dom.style.background="";
            firstCard=null;lock=false;
        },500);
    }
}

// 游戏结束 上传云端
async function gameOver(){
    clearInterval(timer);isRun=false;addUsed();updateChance();
    document.getElementById("gameBox").style.display="none";
    let job=document.getElementById("jobNum").value;
    let name=document.getElementById("userName").value;
    let dept=document.getElementById("deptName").value;

    let rankList = await getCloudRank();
    rankList.push({job,name,dept,score});
    rankList.sort((a,b)=>b.score-a.score);
    if(rankList.length>300)rankList=rankList.slice(0,300);
    await saveCloudRank(rankList);

    document.getElementById("resJob").innerText=job;
    document.getElementById("resName").innerText=name;
    document.getElementById("resDept").innerText=dept;
    document.getElementById("resScore").innerText=score;
    document.getElementById("resPop").style.display="block";
}

// 查看全员互通排行榜
async function showRank(){
    let list = await getCloudRank();
    let html="";
    if(list.length===0)html="<div class='rank-item'>暂无记录</div>";
    else{
        list.slice(0,50).forEach((item,i)=>{
            html += `<div class="rank-item">${i+1}. ${item.name}｜${item.dept}｜${item.score}分</div>`;
        });
    }
    document.getElementById("rankList").innerHTML=html;
    document.getElementById("rankWrap").style.display="block";
}
</script>
</body>
</html>
