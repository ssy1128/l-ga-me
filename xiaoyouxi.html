<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>西咸隆基 · 五一翻翻乐</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: "Microsoft YaHei", sans-serif;
    }
    body {
      background: linear-gradient(to bottom, #e3f2fd, #bbdefb);
      min-height: 100vh;
      padding: 10px;
    }
    .box {
      max-width: 500px;
      margin: auto;
      text-align: center;
    }
    .title {
      font-size: 24px;
      color: #1976d2;
      margin: 15px 0;
    }
    input {
      width: 90%;
      padding: 12px;
      margin: 6px 0;
      border-radius: 30px;
      border: 2px solid #1976d2;
      text-align: center;
    }
    .btn {
      background: #1976d2;
      color: #fff;
      border: none;
      padding: 12px 25px;
      border-radius: 50px;
      margin: 10px 5px;
    }
    .tip {
      color: #f50;
      font-weight: bold;
      margin: 10px 0;
    }
    .game {
      display: none;
    }
    .info {
      font-weight: bold;
      margin: 10px 0;
    }
    .grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 8px;
      max-width: 350px;
      margin: auto;
    }
    .card {
      aspect-ratio: 1;
      background: #1976d2;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #fff;
      font-size: 22px;
    }
    .result,.rank,.count {
      display: none;
      margin: 20px 0;
    }
    .rank {
      background: #fff;
      padding: 15px;
      border-radius: 15px;
    }
    .result {
      background: #fff;
      padding: 25px;
      border-radius: 15px;
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%,-50%);
      box-shadow: 0 0 20px #0003;
    }
    .count {
      font-size: 40px;
      color: red;
      font-weight: bold;
    }
  </style>
</head>
<body>
  <div class="box">
    <div class="title">🏢 西咸隆基 · 五一翻翻乐</div>
    <div class="tip" id="chance">今日剩余次数：5 次</div>

    <input id="job" placeholder="工号">
    <input id="name" placeholder="姓名">
    <input id="dept" placeholder="部门">

    <br>
    <button class="btn" onclick="go()">开始游戏</button>
    <button class="btn" onclick="showRank()">排行榜</button>

    <div class="count" id="cd">3</div>

    <div class="game" id="game">
      <div class="info">得分：<span id="score">0</span></div>
      <div class="info">时间：<span id="time">15</span> 秒</div>
      <div class="grid" id="grid"></div>
    </div>

    <div class="rank" id="rank">
      <h3>🏆 排行榜</h3>
      <div id="rankList"></div>
    </div>

    <div class="result" id="result">
      <h3>🎉 游戏结束</h3>
      <p>工号：<span id="rJob"></span></p>
      <p>姓名：<span id="rName"></span></p>
      <p>部门：<span id="rDept"></span></p>
      <p>得分：<span id="rScore"></span></p>
      <p>称号：<span id="rLevel"></span></p>
      <br>
      <button class="btn" onclick="location.reload()">再来一次</button>
    </div>
  </div>

<script>
  const MAX = 5;
  let score = 0;
  let time = 15;
  let timer;
  let running = false;
  let first = null;
  let lock = false;

  // 这里已经全部改成 .png 格式
  const imgs = ["1.png","2.png","3.png","4.png","5.png","6.png","7.png","8.png"];

  // 次数
  function today(){let d=new Date();return d.getFullYear()+"-"+(d.getMonth()+1)+"-"+d.getDate()}
  function used(){return +localStorage.getItem("lc_"+today())||0}
  function add(){localStorage.setItem("lc_"+today(),used()+1)}
  function update(){document.getElementById("chance").innerText="今日剩余："+Math.max(0,MAX-used())+" 次"}

  window.onload = update;

  // 开始
  function go(){
    let job=document.getElementById("job").value.trim();
    let name=document.getElementById("name").value.trim();
    let dept=document.getElementById("dept").value.trim();
    if(!job||!name||!dept){alert("请填完整！");return}
    if(used()>=MAX){alert("今日次数已用完！");return}

    let c=3;
    document.getElementById("cd").style.display="block";
    let t=setInterval(()=>{
      c--;
      document.getElementById("cd").innerText=c;
      if(c<=0){
        clearInterval(t);
        document.getElementById("cd").style.display="none";
        start();
      }
    },1000);
  }

  // 游戏
  function start(){
    score=0;time=15;running=true;first=null;lock=false;
    document.getElementById("game").style.display="block";
    document.getElementById("score").innerText=score;
    document.getElementById("time").innerText=time;
    mkCards();

    timer=setInterval(()=>{
      time--;
      document.getElementById("time").innerText=time;
      if(time<=0)end();
    },1000);
  }

  // 卡片
  function mkCards(){
    let g=document.getElementById("grid");
    g.innerHTML="";
    let arr=[...imgs,...imgs].sort(()=>Math.random()-0.5);
    arr.forEach((s,i)=>{
      let div=document.createElement("div");
      div.className="card";
      div.innerText="?";
      div.onclick=()=>click(i,s,div);
      g.appendChild(div);
    });
  }

  // 点击
  function click(i,s,div){
    if(!running||lock||div.innerText!="?")return;
    div.innerText="";
    div.style.background=`url(${s}) center/cover`;

    if(!first){first={i,s,div};return}

    lock=true;
    if(first.s==s){
      score++;
      document.getElementById("score").innerText=score;
      first=null;lock=false;
    }else{
      setTimeout(()=>{
        first.div.innerText="?";
        first.div.style.background="#1976d2";
        div.innerText="?";
        div.style.background="#1976d2";
        first=null;lock=false;
      },500);
    }
  }

  // 结束
  function end(){
    clearInterval(timer);running=false;add();update();
    document.getElementById("game").style.display="none";
    let job=document.getElementById("job").value;
    let name=document.getElementById("name").value;
    let dept=document.getElementById("dept").value;

    let list=JSON.parse(localStorage.getItem("rank"))||[];
    list.push({job,name,dept,score});
    list.sort((a,b)=>b.score-a.score);
    if(list.length>100)list=list.slice(0,100);
    localStorage.setItem("rank",JSON.stringify(list));

    let lv="💤 继续加油";
    if(score>=10)lv="🌟 全能达人";
    else if(score>=7)lv="🥇 金牌选手";
    else if(score>=4)lv="🥈 优秀员工";
    else if(score>=1)lv="🥉 合格搭档";

    document.getElementById("rJob").innerText=job;
    document.getElementById("rName").innerText=name;
    document.getElementById("rDept").innerText=dept;
    document.getElementById("rScore").innerText=score;
    document.getElementById("rLevel").innerText=lv;
    document.getElementById("result").style.display="block";
  }

  // 排行榜
  function showRank(){
    let list=JSON.parse(localStorage.getItem("rank"))||[];
    let html="";
    list.slice(0,30).forEach((it,i)=>{
      html+=`<p>${i+1}. ${it.name} | ${it.dept} | ${it.score}分</p>`;
    });
    document.getElementById("rankList").innerHTML=html||"暂无成绩";
    document.getElementById("rank").style.display="block";
  }
</script>
</body>
</html>
